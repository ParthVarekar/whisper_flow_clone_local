# WhisperFlow configuration — Moonshine + rule-based cleanup (Phase 1)
#
# Architecture decision (see SECOND_BRAIN_RESEARCH.md / worklog):
#   ASR backend  = Moonshine Tiny (27M, English-only, in-process ONNX)
#   Cleanup      = rule-based (formatting.py: filler words, backtrack
#                  detection, ITN, spacing, capitalization)
#   LLM cleanup  = OFF by default (mode="raw") for sub-100ms latency.
#
# To ENABLE LLM cleanup (requires llama-server running on port 8081):
#   1. Set mode = "auto" below
#   2. Start llama-server:
#      D:\llama4\llama-server.exe -hf unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL \
#        --host 127.0.0.1 --port 8081 --ctx-size 32768 --n-gpu-layers 999 \
#        --parallel 2 --alias gemma-4-e4b-it --reasoning off --reasoning-budget 0
#   3. Run start.bat as usual. If the LLM server is unreachable, the daemon
#      automatically falls back to the raw rule-formatted transcript.
#
# ---------------------------------------------------------------------------

mode = "raw"              # "raw" = rule-based only (fast, no LLM)
                          # "auto" = LLM cleanup (needs llama-server on 8081)
verbose = false
writing_style = "default"
smart_formatting = true
dictation_hotkey = "ctrl+shift+space"
command_hotkey = "ctrl+shift+t"
dictionary = ["daemon", "daemon.py", "WhisperFlow", "whisper_flow", "Wispr Flow", "whisper.cpp", "llama.cpp", "GGUF", "Python", "VS Code", "GitHub", "pytest", "API"]

[transcription]
backend = "moonshine"     # Moonshine Tiny (27M, English-only, in-process ONNX)
language = "en"           # Moonshine Tiny is English-only; always "en"
threads = 8
flash_attention = false

# Fallback backends (kept for reference, not used when backend = "moonshine")
