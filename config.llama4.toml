# WhisperFlow configuration — whisper.cpp small.en + gemma-4 LLM cleanup
#
# Uses RELATIVE paths so it works on any device after running setup.bat.
# setup.bat downloads: bin\whisper-cli.exe, bin\llama-server.exe,
#                      models\ggml-small.en.bin, models\gemma-4-e4b-it-q4_k_xl.gguf
#
# Start the LLM server with (auto-started by start.bat):
# bin\llama-server.exe -m models\gemma-4-e4b-it-q4_k_xl.gguf --host 127.0.0.1 --port 8081 --ctx-size 32768 --n-gpu-layers 999 --parallel 2 --reasoning off --reasoning-budget 0

mode = "auto"
verbose = false
writing_style = "default"
smart_formatting = true
dictation_hotkey = "ctrl+shift+space"
command_hotkey = "ctrl+shift+t"
dictionary = ["daemon", "daemon.py", "WhisperFlow", "whisper_flow", "Wispr Flow", "whisper.cpp", "llama.cpp", "GGUF", "Python", "VS Code", "GitHub", "pytest", "API", "Qwen3-ASR (kwen three)", "Qwen3 (kwen three)", "Moonshine", "crispasr", "CrispASR"]

[transcription]
backend = "whisper_cpp"
whisper_bin = 'bin\whisper-cli.exe'
model = 'models\ggml-small.en.bin'
language = "en"
threads = 8
flash_attention = true

# Alternative: medium.en (more accurate, ~3-5s ASR)
# model = 'models\ggml-medium.en.bin'

# Fallback backend: Qwen3-ASR (most accurate, ~33s ASR — too slow for daily use)
# backend = "qwen3_asr"
# qwen3_asr_bin = 'third_party\crispasr\crispasr.exe'
# qwen3_asr_model = 'models\qwen3-asr-1.7b-q4_k.gguf'
# qwen3_asr_mmproj = 'models\mmproj-Qwen3-ASR-1.7B-Q8_0.gguf'

[audio]
mic_backend = "sounddevice"
mic_device = "default"
stream = true
stream_chunk_s = 1
stream_max_s = 12

[llm]
mode = "server"
llama_server_bin = 'bin\llama-server.exe'
llama_cli_bin = 'bin\llama-cli.exe'
model = 'models\gemma-4-e4b-it-q4_k_xl.gguf'
host = "127.0.0.1"
port = 8081
n_ctx = 2048
temperature = 0.3
max_tokens = 512
top_p = 0.9

[snippets]
"my email" = "parth@example.com"
"my signature" = "Best regards,\nParth"

[app_styles.work_messaging]
mode = "medium"
writing_style = "formal"

[app_styles.messaging]
mode = "light"
writing_style = "casual"

[app_styles.code]
mode = "none"
writing_style = "default"
