# qwen3_asr_model = 'C:\Users\Parth\Desktop\whisper\models\qwen3-asr-1.7b-q4_k.gguf'
# qwen3_asr_mmproj = 'C:\Users\Parth\Desktop\whisper\models\mmproj-Qwen3-ASR-1.7B-Q8_0.gguf'

[audio]
mic_backend = "sounddevice"
mic_device = "default"
stream = true
stream_chunk_s = 1
stream_max_s = 12

[llm]
# Only used when mode = "auto" (or "light"/"medium"/"high"/"summarize"/etc.)
# When mode = "raw", this section is ignored — no LLM server is contacted.
mode = "server"
llama_server_bin = 'D:\llama4\llama-server.exe'
llama_cli_bin = 'D:\llama4\llama-cli.exe'
model = 'C:\Users\Parth\.cache\huggingface\hub\models--unsloth--gemma-4-E4B-it-GGUF\snapshots\e1d90e5fb9f61d8dc71ef016580784a054e5c787\gemma-4-E4B-it-UD-Q4_K_XL.gguf'
host = "127.0.0.1"
port = 8081
n_ctx = 2048
temperature = 0.3
max_tokens = 2048
top_p = 0.9

[snippets]
"my email" = "parth@example.com"
"my signature" = "Best regards,\nParth"

[app_styles.work_messaging]
mode = "medium"
writing_style = "formal"

[app_styles.messaging]
mode = "light"
