# WhisperFlow configuration — Qwen3-ASR + rule-based cleanup
#
# Architecture decision (revised July 2026, iteration 3):
#   ASR backend  = Qwen3-ASR (1.7B speech-LLM via CrispASR)
#   Cleanup      = rule-based (formatting.py)
#   LLM cleanup  = OFF by default (mode="raw") for fast, no-server operation
#
# WHY NOT Moonshine Tiny (27M)?
#   Too small for desktop/distant mic. Produced complete hallucinations.
#
# WHY NOT whisper.cpp base.en (74M)?
#   Also too small for this mic setup. Produced garbled transcripts:
#   "test 3" → "destitute", "pronunciation" → "constitution"
#
# WHY Qwen3-ASR (1.7B)?
#   - User confirmed it works accurately with their mic setup
#   - 1.7B params (23x larger than base.en) handles distant mic + noise
#   - Speech-LLM specifically designed for ASR (not a general model)
#   - Already installed: crispasr.exe + qwen3-asr-1.7b-q4_k.gguf + mmproj
#
# ALTERNATIVE: Whisper medium.en (769M)
#   If you want to try a larger Whisper model instead:
#   1. Download: cd third_party/whisper.cpp && bash models/download-ggml-model.sh medium.en
#   2. Move: move models\ggml-medium.en.bin ..\models\
#   3. Edit this config: backend = "whisper_cpp", model = '...ggml-medium.en.bin'
#
# To ENABLE LLM cleanup (requires llama-server on port 8081):
#   Set mode = "auto" and start llama-server (see [llm] section below)
#
# ---------------------------------------------------------------------------

mode = "raw"              # "raw" = rule-based only (fast, no LLM)
                          # "auto" = LLM cleanup (needs llama-server on 8081)
verbose = false
writing_style = "default"
smart_formatting = true
dictation_hotkey = "ctrl+shift+space"
command_hotkey = "ctrl+shift+t"
dictionary = ["daemon", "daemon.py", "WhisperFlow", "whisper_flow", "Wispr Flow", "whisper.cpp", "llama.cpp", "GGUF", "Python", "VS Code", "GitHub", "pytest", "API"]

[transcription]
# Primary backend: Qwen3-ASR (1.7B, most accurate for this mic setup)
backend = "qwen3_asr"
qwen3_asr_bin = 'C:\Users\Parth\Desktop\whisper\third_party\crispasr\crispasr.exe'
qwen3_asr_model = 'C:\Users\Parth\Desktop\whisper\models\qwen3-asr-1.7b-q4_k.gguf'
qwen3_asr_mmproj = 'C:\Users\Parth\Desktop\whisper\models\mmproj-Qwen3-ASR-1.7B-Q8_0.gguf'
language = "en"           # "en" for English; "auto" for auto-detect
threads = 8

# Alternative: whisper.cpp with a LARGER model (medium.en = 769M)
# To use: download medium.en, then uncomment these lines:
# backend = "whisper_cpp"
# whisper_bin = 'C:\Users\Parth\Desktop\whisper\third_party\whisper.cpp-bin\whisper-bin-x64\Release\whisper-cli.exe'
# model = 'C:\Users\Parth\Desktop\whisper\models\ggml-medium.en.bin'
# flash_attention = true

# Alternative: Moonshine Tiny (27M, fast but inaccurate for distant mic)
# backend = "moonshine"

[audio]
mic_backend = "sounddevice"
mic_device = "default"
stream = true
stream_chunk_s = 1
stream_max_s = 12

[llm]
# Only used when mode = "auto"
# When mode = "raw", this section is ignored — no LLM server is contacted.
mode = "server"
llama_server_bin = 'D:\llama4\llama-server.exe'
llama_cli_bin = 'D:\llama4\llama-cli.exe'
model = 'C:\Users\Parth\.cache\huggingface\hub\models--unsloth--gemma-4-E4B-it-GGUF\snapshots\e1d90e5fb9f61d8dc71ef016580784a054e5c787\gemma-4-E4B-it-UD-Q4_K_XL.gguf'
host = "127.0.0.1"
port = 8081
n_ctx = 2048
temperature = 0.3
max_tokens = 2048
top_p = 0.9

[snippets]
"my email" = "parth@example.com"
"my signature" = "Best regards,\nParth"

[app_styles.work_messaging]
mode = "medium"
writing_style = "formal"

[app_styles.messaging]
mode = "light"
writing_style = "casual"

[app_styles.code]
mode = "none"
writing_style = "default"
