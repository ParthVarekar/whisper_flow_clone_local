# WhisperFlow configuration — Whisper.cpp + rule-based cleanup
#
# Architecture decision (revised July 2026):
#   ASR backend  = whisper.cpp with ggml-base.en (74M params)
#   Cleanup      = rule-based (formatting.py)
#   LLM cleanup  = OFF by default (mode="raw") for fast, no-server operation
#
# WHY NOT MOONSHINE?
#   Moonshine Tiny (27M) was too small for real-world desktop/laptop mic
#   capture at a distance. It produced hallucinated transcripts that didn't
#   match what was spoken. Whisper Base (74M) is 2.8x larger and handles
#   distant mic capture + background noise far better.
#
# To switch back to Moonshine (for close-mic / headset use):
#   1. Set backend = "moonshine" below
#   2. Comment out whisper_bin + model
#   3. Moonshine runs in-process (no external binary needed)
#
# To ENABLE LLM cleanup (requires llama-server running on port 8081):
#   1. Set mode = "auto" below
#   2. Start llama-server:
#      D:\llama4\llama-server.exe -hf unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL \
#        --host 127.0.0.1 --port 8081 --ctx-size 32768 --n-gpu-layers 999 \
#        --parallel 2 --alias gemma-4-e4b-it --reasoning off --reasoning-budget 0
#   3. If the LLM server is unreachable, the daemon automatically falls back
#      to the raw rule-formatted transcript.
#
# ---------------------------------------------------------------------------

mode = "raw"              # "raw" = rule-based only (fast, no LLM)
                          # "auto" = LLM cleanup (needs llama-server on 8081)
verbose = false
writing_style = "default"
smart_formatting = true
dictation_hotkey = "ctrl+shift+space"
command_hotkey = "ctrl+shift+t"
dictionary = ["daemon", "daemon.py", "WhisperFlow", "whisper_flow", "Wispr Flow", "whisper.cpp", "llama.cpp", "GGUF", "Python", "VS Code", "GitHub", "pytest", "API"]

[transcription]
# Primary backend: whisper.cpp with ggml-base.en (74M, English-only)
# Much more accurate than Moonshine Tiny for desktop/distant mic capture.
backend = "whisper_cpp"
whisper_bin = 'C:\Users\Parth\Desktop\whisper\third_party\whisper.cpp-bin\whisper-bin-x64\Release\whisper-cli.exe'
model = 'C:\Users\Parth\Desktop\whisper\models\ggml-base.en.bin'
language = "en"           # English-only model; always "en"
threads = 8
flash_attention = true

# Alternative backend: Moonshine Tiny (27M, in-process ONNX)
# Faster (~50ms vs ~500ms) but less accurate for distant mic.
# To use: uncomment these lines and comment out the whisper_cpp lines above.
# backend = "moonshine"
# language = "en"

# Alternative backend: Qwen3-ASR (1.7B, most accurate but needs crispasr.exe)
# To use: uncomment these lines and comment out the whisper_cpp lines above.
# backend = "qwen3_asr"
# qwen3_asr_bin = 'C:\Users\Parth\Desktop\whisper\third_party\crispasr\crispasr.exe'
# qwen3_asr_model = 'C:\Users\Parth\Desktop\whisper\models\qwen3-asr-1.7b-q4_k.gguf'
# qwen3_asr_mmproj = 'C:\Users\Parth\Desktop\whisper\models\mmproj-Qwen3-ASR-1.7B-Q8_0.gguf'

[audio]
mic_backend = "sounddevice"
mic_device = "default"
stream = true
stream_chunk_s = 1
stream_max_s = 12

[llm]
# Only used when mode = "auto" (or "light"/"medium"/"high"/"summarize"/etc.)
# When mode = "raw", this section is ignored — no LLM server is contacted.
mode = "server"
llama_server_bin = 'D:\llama4\llama-server.exe'
llama_cli_bin = 'D:\llama4\llama-cli.exe'
model = 'C:\Users\Parth\.cache\huggingface\hub\models--unsloth--gemma-4-E4B-it-GGUF\snapshots\e1d90e5fb9f61d8dc71ef016580784a054e5c787\gemma-4-E4B-it-UD-Q4_K_XL.gguf'
host = "127.0.0.1"
port = 8081
n_ctx = 2048
temperature = 0.3
max_tokens = 2048
top_p = 0.9

[snippets]
"my email" = "parth@example.com"
"my signature" = "Best regards,\nParth"

[app_styles.work_messaging]
mode = "medium"
writing_style = "formal"

[app_styles.messaging]
mode = "light"
writing_style = "casual"

[app_styles.code]
mode = "none"
writing_style = "default"
