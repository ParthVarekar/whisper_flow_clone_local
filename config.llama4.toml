# Local llama.cpp setup for Whisperflow.
# Start the LLM server with:
# D:\llama4\llama-server.exe -hf unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL --host 127.0.0.1 --port 8081 --ctx-size 32768 --n-gpu-layers 999 --parallel 2 --alias gemma-4-e4b-it --reasoning off --reasoning-budget 0
#
# See PROGRESS.md for the full history of what works and what doesn't.
# Key: Qwen3-ASR + mode="auto" (LLM cleanup) is the working configuration.

mode = "auto"
verbose = false
writing_style = "default"
smart_formatting = true
dictation_hotkey = "ctrl+shift+space"
command_hotkey = "ctrl+shift+t"
dictionary = ["daemon", "daemon.py", "WhisperFlow", "whisper_flow", "Wispr Flow", "whisper.cpp", "llama.cpp", "GGUF", "Python", "VS Code", "GitHub", "pytest", "API", "Gemma", "Gemma 2", "Gemma 4", "Gemma 4 E2B", "Gemma-4 E2B", "E2B", "E4B", "Qwen3-ASR", "CrispASR"]

[transcription]
backend = "whisper_cpp"
# GPU Accelerated whisper.cpp (small.en - sub-2s latency + prompt bias)
whisper_bin = 'C:\Users\Parth\Desktop\whisper\third_party\whisper.cpp-bin\whisper-bin-x64\Release\whisper-cli.exe'
model = 'C:\Users\Parth\Desktop\whisper\models\ggml-small.en.bin'
language = "en"
threads = 8
flash_attention = true

[audio]
mic_backend = "sounddevice"
mic_device = "default"
stream = true
stream_chunk_s = 1
stream_max_s = 12

[llm]
mode = "server"
llama_server_bin = 'D:\llama4\llama-server.exe'
llama_cli_bin = 'D:\llama4\llama-cli.exe'
model = 'C:\Users\Parth\.cache\huggingface\hub\models--unsloth--gemma-4-E2B-it-GGUF\snapshots\0314792d7f1f7e229411f620751375812bb9faf2\gemma-4-E2B-it-UD-Q4_K_XL.gguf'
host = "127.0.0.1"
port = 8081
n_ctx = 2048
temperature = 0.3
max_tokens = 2048
top_p = 0.9

[snippets]
"my email" = "parth@example.com"
"my signature" = "Best regards,\nParth"

[app_styles.work_messaging]
mode = "medium"
writing_style = "formal"

[app_styles.messaging]
mode = "light"
writing_style = "casual"

[app_styles.code]
mode = "none"
writing_style = "default"
